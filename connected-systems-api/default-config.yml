resources:
  dutch_windmills:
    type: collection
    title: Windmills within The Netherlands
    description: Locations of windmills within the Netherlands from Rijksdienst voor het Cultureel Erfgoed (RCE) INSPIRE WFS. Uses GeoServer WFS v2 backend via OGRProvider.
    keywords:
      - Netherlands
      - INSPIRE
      - Windmills
      - Heritage
      - Holland
      - RD
    crs:
      - CRS84
    links:
      - type: text/html
        rel: canonical
        title: information
        href: https://www.nationaalgeoregister.nl/geonetwork/srv/dut/catalog.search#/metadata/291afe4b-4f4b-497c-8026-fb437c4e9c7e
        hreflang: nl-NL
    extents:
      spatial:
        bbox: [ 3.37,50.75,7.21,53.47 ]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
      temporal:
        begin:
        end: null  # or empty
    providers:
      - type: feature
        name: OGR
        data:
          source_type: WFS
          source: WFS:https://services.rce.geovoorziening.nl/landschapsatlas/wfs?
          source_capabilities:
            paging: True

          source_options:
            #                    OGR_WFS_VERSION: 1.1.0
            OGR_WFS_LOAD_MULTIPLE_LAYER_DEFN: NO

          gdal_ogr_options:
            EMPTY_AS_NULL: NO
            GDAL_CACHEMAX: 64
            # GDAL_HTTP_PROXY: (optional proxy)
            # GDAL_PROXY_AUTH: (optional auth for remote WFS)
            CPL_DEBUG: NO

        id_field: gml_id
        layer: landschapsatlas:Molens
        crs:
          - http://www.opengis.net/def/crs/OGC/1.3/CRS84
          - http://www.opengis.net/def/crs/EPSG/0/4326
          - http://www.opengis.net/def/crs/EPSG/0/3857
          - http://www.opengis.net/def/crs/EPSG/0/4258
          - http://www.opengis.net/def/crs/EPSG/0/28992
        storage_crs: http://www.opengis.net/def/crs/EPSG/0/28992

dynamic-resources:
  csa-part1:
    type: connected-systems-part1
    title: "elasticsearch-csa-adapter"
    description: "Adapter to Elasticsearch CSA-Part1 Backend"
    strict_validation: True
    keywords: [ ]
    provider: &es-config
      type: elastic-csa-adapter
      name: ElasticSearchConnectedSystems
      host: localhost
      port: 9200
      user: elastic
      password: password
      verify_certs: False   # True if ES certificates are to be validated. Default 'true'
      ca_certs: ""   # Path to PEM-encoded Certificate of ES

  csa-part2:
    type: connected-systems-part2
    title: "timescale-csa-adapter"
    description: "Adapter to TimescaleDB CSA-Part2 Backend"
    keywords: [ ]
    strict_validation: False
    provider:
      type: timescale-csa-adapter
      name: TimescaleDBConnectedSystems
      timescale:
        host: localhost
        port: 5433
        dbname: csa
        user: timescaledb
        password: password
      elastic: *es-config